name: Deploy backend (AWS SAM)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC to AWS
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lambda dependencies
        run: npm install --omit=dev --prefix src

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          PARAMS="ClerkIssuer=${{ secrets.CLERK_ISSUER }}"
          if [ -n "${{ secrets.CLERK_AUDIENCE }}" ]; then
            PARAMS="$PARAMS ClerkAudience=${{ secrets.CLERK_AUDIENCE }}"
          fi
          sam deploy \
            --stack-name card-game-platform \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides $PARAMS